services:

  # ── Frontend (React + nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: noxdigital_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - noxdigital

  # ── Backend (Express API) ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: noxdigital_backend
    restart: unless-stopped
    ports:
      - "3001:3001"   # expor diretamente p/ debug (opcional)
    env_file:
      - ./backend/.env
    networks:
      - noxdigital

networks:
  noxdigital:
    driver: bridge
